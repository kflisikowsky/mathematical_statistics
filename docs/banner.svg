<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 360" role="img" aria-labelledby="title desc">
  <title id="title">Mathematical Statistics in Python banner</title>
  <desc id="desc">A dark gradient banner with a statistics-themed geometric pattern and book title.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081120" />
      <stop offset="55%" stop-color="#0f2a3a" />
      <stop offset="100%" stop-color="#163b53" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc" />
      <stop offset="50%" stop-color="#a7f3d0" />
      <stop offset="100%" stop-color="#fde68a" />
    </linearGradient>
    <pattern id="grid" width="70" height="70" patternUnits="userSpaceOnUse">
      <path d="M 70 0 L 0 0 0 70" fill="none" stroke="#ffffff12" stroke-width="1" />
      <circle cx="0" cy="0" r="2.5" fill="#ffffff18" />
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <rect width="1400" height="360" fill="url(#bg)" />
  <rect width="1400" height="360" fill="url(#grid)" opacity="0.9" />
  <path d="M0 280 C180 220, 320 220, 480 260 S820 320, 1000 260 S1240 200, 1400 240 L1400 360 L0 360 Z" fill="#ffffff0a" />
  <path d="M0 300 C170 250, 330 260, 500 300 S860 360, 1040 300 S1240 230, 1400 270" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.9" filter="url(#shadow)" />
  <g transform="translate(940 68)" opacity="0.95">
    <circle cx="70" cy="70" r="58" fill="#ffffff10" stroke="#ffffff26" stroke-width="2" />
    <circle cx="70" cy="70" r="28" fill="#7dd3fc" fill-opacity="0.18" stroke="#7dd3fc" stroke-width="3" />
    <path d="M22 118 L56 88 L84 102 L116 58 L134 68" fill="none" stroke="#a7f3d0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="56" cy="88" r="5" fill="#a7f3d0" />
    <circle cx="84" cy="102" r="5" fill="#a7f3d0" />
    <circle cx="116" cy="58" r="5" fill="#a7f3d0" />
    <circle cx="134" cy="68" r="5" fill="#a7f3d0" />
  </g>
  <g transform="translate(110 104)">
    <text x="0" y="0" fill="#e5f2ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="700">Mathematical Statistics</text>
    <text x="0" y="64" fill="#c7d7e6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="500">in Python</text>
    <text x="0" y="128" fill="#a8bfd3" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="400">Theory, intuition, and computation in one place.</text>
  </g>
  <g transform="translate(110 248)">
    <rect x="0" y="0" width="176" height="10" rx="5" fill="url(#accent)" />
    <rect x="0" y="0" width="88" height="10" rx="5" fill="#ffffff" opacity="0.75" />
  </g>
</svg>